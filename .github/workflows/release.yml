name: Release

# Publishes a GitHub Release whenever a version tag (e.g. v0.1.7) is pushed.
# The release notes are taken verbatim from the matching section in CHANGELOG.md,
# so the changelog stays the single source of truth for what shipped in a version.
#
# Usage after merging a version bump to main:
#   git tag v0.1.7
#   git push origin v0.1.7

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract release notes from CHANGELOG.md
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="$version" '
            $0 ~ "^## " ver "( |$)" { flag = 1; next }
            /^## / { flag = 0 }
            /^---$/ { if (flag) exit }
            flag { print }
          ' CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "::error::No CHANGELOG.md section found for version ${version}. Add a '## ${version} — <date>' entry before tagging."
            exit 1
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file release_notes.md
